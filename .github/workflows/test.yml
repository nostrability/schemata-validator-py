name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone schemata-py
        run: git clone https://github.com/nostrability/schemata-py.git ../schemata-py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install jsonschema pytest
      - run: PYTHONPATH=../schemata-py:. pytest tests/ -v
