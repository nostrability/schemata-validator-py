name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: nostrability/schemata-py
          path: ../schemata-py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install jsonschema pytest
      - run: pip install -e ../schemata-py
      - run: PYTHONPATH=. pytest tests/ -v
